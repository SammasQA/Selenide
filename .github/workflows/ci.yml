name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Remove all existing Chrome versions
        run: |
          sudo apt-get remove -y google-chrome-stable || true
          sudo apt-get purge -y google-chrome-stable || true
          sudo apt-get autoremove -y || true
          rm -rf ~/.cache/google-chrome || true
          rm -rf ~/.config/google-chrome || true

      - name: Setup Chrome (version 118)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: '118'

      - name: Verify Chrome version and path
        run: |
          which google-chrome
          google-chrome --version

      - name: Verify Chrome can run headless
        run: google-chrome --headless --no-sandbox --disable-gpu --dump-dom https://example.com

      - name: Start SUT
        run: java -jar ./artifacts/app-card-delivery.jar &

      - name: Wait for SUT to be ready
        run: sleep 10

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --info -Dselenide.headless=true