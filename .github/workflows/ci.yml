name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Chrome 118 (совместимый с Selenium 4.13.0)
        run: |
          wget -q https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_118.0.5993.70-1_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./google-chrome-stable_118.0.5993.70-1_amd64.deb
          sudo apt-mark hold google-chrome-stable
          google-chrome --version

      - name: Verify Chrome can run headless
        run: google-chrome --headless --no-sandbox --disable-gpu --dump-dom https://example.com

      - name: Start SUT
        run: java -jar ./artifacts/app-card-delivery.jar &

      - name: Wait for SUT to be ready
        run: sleep 10

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --info -Dselenide.headless=true